limit_req_zone $binary_remote_addr zone=huicien_api_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=huicien_api_general:10m rate=20r/s;

upstream huicien_api_v2_test {
    server 127.0.0.1:8797;
    keepalive 32;
}

server {
    listen 80;
    server_name api-test.huicien.com org-test.huicien.com admin-test.huicien.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-test.huicien.com;

    ssl_certificate /etc/letsencrypt/live/api-test.huicien.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-test.huicien.com/privkey.pem;
    client_max_body_size 6m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api-test.huicien.com; img-src 'self' data: blob:; style-src 'self'; script-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/health {
        proxy_pass http://huicien_api_v2_test;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    location ~ ^/api/auth/(institution|admin)/login$ {
        limit_req zone=huicien_api_login burst=5 nodelay;
        proxy_pass http://huicien_api_v2_test;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        add_header Cache-Control "no-store";
    }

    location /api/ {
        limit_req zone=huicien_api_general burst=40 nodelay;
        proxy_pass http://huicien_api_v2_test;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store";
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    server_name org-test.huicien.com;

    ssl_certificate /etc/letsencrypt/live/org-test.huicien.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/org-test.huicien.com/privkey.pem;
    root /var/www/huicien-v2/org;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api-test.huicien.com; img-src 'self' data: blob:; style-src 'self'; script-src 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|svg|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

server {
    listen 443 ssl http2;
    server_name admin-test.huicien.com;

    ssl_certificate /etc/letsencrypt/live/admin-test.huicien.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-test.huicien.com/privkey.pem;
    root /var/www/huicien-v2/admin;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|svg|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
